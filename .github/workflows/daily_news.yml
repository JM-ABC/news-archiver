name: 이커머스/FMCG 뉴스 아카이빙

on:
  schedule:
    - cron: '0 23 * * 0,2,4'  # 매주 일/화/목 UTC 23:00 = 한국시간 월/수/금 오전 8시
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main        # 트리거 시점이 아닌 항상 최신 main 체크아웃
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 오늘 날짜 설정
        run: echo "TODAY=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: 뉴스 아카이빙 실행
        env:
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY:        ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:    ${{ secrets.NOTION_DATABASE_ID }}
          RESEND_API_KEY:        ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM:            ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:              ${{ secrets.EMAIL_TO }}
          EMAIL_BCC:             ${{ secrets.EMAIL_BCC }}
          TRENDS_DIR:            ./trends
        run: python news_archiver.py

      - name: 결과 파일 커밋
        env:
          REPO_URL: https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch "$REPO_URL" main:refs/remotes/origin/main
          git add trends/
          if git diff --cached --quiet; then
            echo "변경 없음, 커밋 건너뜀"
          else
            git commit -m "trend: ${{ env.TODAY }} 뉴스 리포트 자동 생성"
            echo "push 시작 (--force)"
            git push --force "$REPO_URL" HEAD:main
            echo "push 완료"
          fi
