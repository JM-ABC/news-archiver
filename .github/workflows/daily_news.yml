name: 이커머스/FMCG 뉴스 아카이빙

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 오후 11시 UTC = 한국시간 오전 8시
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0   # 전체 히스토리 가져와 rebase 충돌 방지

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 뉴스 아카이빙 실행
        env:
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          NOTION_API_KEY:        ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:    ${{ secrets.NOTION_DATABASE_ID }}
          TRENDS_DIR:            ./trends
        run: python news_archiver.py

      - name: 결과 파일 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git
          git add trends/
          if git diff --cached --quiet; then
            echo "변경된 파일 없음, 커밋 건너뜀"
          else
            git commit -m "trend: $(date +'%Y-%m-%d') 뉴스 리포트 자동 생성"
            git fetch origin main
            git rebase FETCH_HEAD    # origin/main 대신 FETCH_HEAD 사용
            git push origin main
          fi
